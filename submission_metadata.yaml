# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
  - "Other"

ai_usage_summary: |
  Used Gemini as an agentic pair-programming assistant to build, test, and package the solution.
  No candidate data was shared with external APIs during the evaluation and scoring steps.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based candidate ranking system with explicit honeypot filtering to remove invalid profiles.
  Extracted normalized numeric features for skills match, experience, seniority, behavioral signals, 
  and availability in a streamed processing pipeline (chunks of 5,000) to keep RAM footprint low, 
  maintaining a running shortlist of the top 2,000. Computed cosine similarities on candidate text blocks
  (summary + career descriptions) using sentence-transformers model 'all-MiniLM-L6-v2' on CPU and completed
  re-scoring. Down-weighted consulting-firm-only profiles to align with JD preferences. Total runtime is ~152 seconds.

